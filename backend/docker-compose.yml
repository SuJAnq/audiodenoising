version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../checkpoints:/app/checkpoints
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000
      - MAX_DURATION_SEC=325
      - CHECKPOINT_DIR=/app/checkpoints
